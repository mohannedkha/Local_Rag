ollama:
  base_url: "http://localhost:11434"
  llm_model: "llama3.2"
  embed_model: "nomic-embed-text"
  temperature: 0.1
  context_window: 8192

ingestion:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  chunks_dir: "data/chunks"
  # PDF conversion backend: "pymupdf4llm" or "marker"
  pdf_backend: "pymupdf4llm"

chunking:
  strategy: "semantic"          # "semantic" | "recursive" | "fixed"
  chunk_size: 512               # target tokens per chunk
  chunk_overlap: 64             # overlap between chunks in tokens
  # Semantic chunking: similarity threshold to break a new chunk (0.0–1.0)
  semantic_threshold: 0.5
  min_chunk_size: 100           # discard chunks smaller than this (tokens)

vector_store:
  persist_dir: "db"
  collection_name: "documents"
  distance_metric: "cosine"     # "cosine" | "l2" | "ip"
  top_k: 5                      # default number of results to retrieve
  # MMR diversity factor (0 = pure similarity, 1 = pure diversity)
  mmr_lambda: 0.5

memory:
  persist_dir: "db"
  conversation_collection: "conversation_memory"
  # Short-term: keep last N turns in context
  short_term_window: 10
  # Long-term: store summaries when conversation exceeds this many turns
  long_term_threshold: 20
  # Number of long-term memories to inject into each query
  long_term_top_k: 3

rag:
  # System prompt template
  system_prompt: |
    You are a helpful assistant with access to a private knowledge base.
    Answer questions using only the provided context. If the context does
    not contain enough information to answer, say so clearly.
    Be concise and precise.
  # Reranker: "none" | "cross_encoder"
  reranker: "none"
  # Maximum context tokens to send to LLM
  max_context_tokens: 4096
