ollama:
  base_url: "http://localhost:11434"
  llm_model: "llama3.2"
  # mxbai-embed-large: best Ollama retrieval model (MTEB 64.68), outperforms nomic-embed-text
  # on long documents and semantic depth. Pull with: ollama pull mxbai-embed-large
  embed_model: "mxbai-embed-large"
  temperature: 0.1
  context_window: 8192

ingestion:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  chunks_dir: "data/chunks"
  pdf_backend: "pymupdf4llm"

chunking:
  # Parent-child strategy: child chunks retrieved for precision,
  # parent chunks returned as LLM context to preserve document structure.
  strategy: "semantic"            # "semantic" | "recursive" | "fixed"

  # Child chunks: small, precise — used for vector search
  # mxbai-embed-large limit is 512 tokens; stay well below it
  child_chunk_size: 200           # tokens
  child_chunk_overlap: 24         # tokens

  # Parent chunks: large sections — returned as context to LLM
  parent_chunk_size: 1024         # tokens
  parent_chunk_overlap: 64        # tokens

  semantic_threshold: 0.5
  min_chunk_size: 80              # discard child chunks smaller than this

vector_store:
  persist_dir: "db"
  collection_name: "doc_children"       # child chunks (embedded)
  parent_collection: "doc_parents"      # parent sections (text store)
  distance_metric: "cosine"
  top_k: 5                              # child chunks to retrieve
  mmr_lambda: 0.5

memory:
  persist_dir: "db"
  conversation_collection: "conversation_memory"
  short_term_window: 10
  long_term_threshold: 20
  long_term_top_k: 3

rag:
  system_prompt: |
    You are a helpful assistant with access to a private knowledge base.
    Answer questions using only the provided document context.
    Always cite the source document name when referencing information.
    If the context does not contain enough information to answer, say so clearly.
    Be concise and precise.
  reranker: "none"
  max_context_tokens: 4096
